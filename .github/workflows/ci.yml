name: CI

on:
  push:
    branches:
      - 'team/**'
      - 'feature/**'
      - 'fix/**'
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependencies installieren
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov ruff
          for req in modules/*/requirements.txt services/api/requirements.txt; do
            [ -f "$req" ] && pip install -r "$req" || true
          done

      - name: Linting (ruff)
        run: ruff check modules/ services/api/ scripts/ || true

      - name: Unit Tests
        run: |
          pytest tests/unit/ -v --cov=modules --cov-report=term-missing --cov-fail-under=80

      - name: Integration Tests
        run: |
          pytest tests/integration/ -v || true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - name: Dependencies installieren
        run: npm ci --if-present || true

      - name: Tests ausführen
        run: npm test --if-present || true
